<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Mi Perfil</title>
    
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h4>Información de Usuario</h4>
                    </div>
                    <div class="card-body">
                        <ul class="list-group">
                            <li class="list-group-item"><strong>Nombre:</strong> {{ usuario.nombre }}</li>
                            <li class="list-group-item"><strong>Usuario:</strong> {{ usuario.usuario }}</li>
                            <li class="list-group-item"><strong>Celular:</strong> {{ usuario.celular }}</li>
                            <li class="list-group-item"><strong>Email:</strong> {{ usuario.email }}</li>
                            <li class="list-group-item"><strong>Rol:</strong> 
                                {% if usuario.es_admin %}
                                    Administrador
                                {% else %}
                                    Usuario Normal
                                {% endif %}
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        function actualizarContadorCarrito() {
    fetch('/api/carrito/count')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('carritoCount');
            if (data.count > 0) {
                badge.textContent = data.count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        });
}

// Llamar al cargar la página
actualizarContadorCarrito();

// Actualizar después de agregar al carrito
function agregarAlCarrito(productoId) {
    // ... código existente ...
    // Al final, agregar:
    actualizarContadorCarrito();
}
    </script>
  
</body>
</html>
